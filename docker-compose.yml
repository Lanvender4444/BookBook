version: '3.8'

# Port mappings below should match config.json (backend_port, frontend_port, p2p_port).
# If you change ports in config.json, update the mappings accordingly.

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///./data/ebooks.db

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}